[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
yanked = "warn"
ignore = [
    "RUSTSEC-2025-0141",
    "RUSTSEC-2025-0119",
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "Unlicense",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = [
    { name = "syn", version = "1", depth = 10 },
    { name = "mio", version = "*", depth = 5 },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
